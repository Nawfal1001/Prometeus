name: Apply Claude Review Fixes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-claude-review-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply fixes
        run: python scripts/apply_claude_review_fixes.py

      - name: Commit and push
        run: |
          git config user.name "prometheus-fix-bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Apply Claude review fixes" || echo "No changes to commit"
          git push
