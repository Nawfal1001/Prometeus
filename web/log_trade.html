<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prometheus Log Trade</title><style>body{margin:0;background:#071018;color:#e8f1f8;font-family:system-ui}main{padding:18px;display:grid;gap:16px}.card{border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;background:#101b26}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px;text-align:left}.muted{color:#8fa4b8}.long{color:#25d695}.short{color:#ff5c7a}.logbox{max-height:520px;overflow:auto;background:#050b10;border-radius:12px;padding:10px}.logrow{display:grid;grid-template-columns:92px 90px 1fr;gap:8px;padding:7px;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px}.pill{padding:4px 8px;border-radius:99px;background:rgba(255,255,255,.08)}button{margin:4px;padding:8px 10px;border:0;border-radius:9px;background:#5ab0ff;font-weight:700}</style></head><body><main><h1>Prometheus — Log Trade</h1><div id="conn" class="muted">connecting…</div><section class="card"><h2>Autoscan / Signal / Order Decisions</h2><div><button onclick="setFilter('all')">All</button><button onclick="setFilter('autoscan')">Autoscan</button><button onclick="setFilter('signal')">Signal</button><button onclick="setFilter('order')">Order</button><button onclick="setFilter('error')">Error</button></div><div id="decisionLog" class="logbox muted">No logs yet</div></section><section class="card"><h2>Auto-symbol ranking</h2><table><thead><tr><th>Symbol</th><th>Score</th><th>Side</th><th>Trade</th><th>Reason</th><th>Risk</th></tr></thead><tbody id="ranked"><tr><td colspan="6" class="muted">No ranking yet</td></tr></tbody></table></section><section class="card"><h2>Open trades</h2><table><thead><tr><th>Symbol</th><th>Side</th><th>Entry</th><th>PnL</th><th>Risk</th><th>Bars</th></tr></thead><tbody id="trades"><tr><td colspan="6" class="muted">No open trades</td></tr></tbody></table></section><section class="card"><h2>Recent closed trades</h2><table><thead><tr><th>ID</th><th>Side</th><th>Exit</th><th>PnL</th><th>Capital</th></tr></thead><tbody id="tradeLog"><tr><td colspan="5" class="muted">No closed trades</td></tr></tbody></table></section></main><script>let filter='all',last=null;const $=id=>document.getElementById(id),money=v=>isFinite(+v)?'$'+(+v).toFixed(2):'—',num=(v,d=3)=>isFinite(+v)?(+v).toFixed(d):'—',esc=x=>String(x??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function setFilter(f){filter=f;if(last)render(last)}function unwrap(p){return p&&p.data?p.data:p}function sideClass(s){return String(s||'').toLowerCase()==='short'?'short':'long'}function ts(t){try{return new Date(t).toLocaleTimeString()}catch(e){return '—'}}function render(p){const s=unwrap(p)||{};last=s;const logs=s.decision_log||[],ranked=s.rotator_ranked||[],trades=s.open_trades||[],tradeLog=s.trade_log||[];const fl=logs.filter(e=>filter==='all'||String(e.type||'').includes(filter)).slice(-160).reverse();$('decisionLog').innerHTML=fl.length?fl.map(e=>`<div class="logrow"><span class="muted">${ts(e.ts)}</span><b>${esc(e.type)}</b><span>${esc(e.message)}<br><span class="muted">${esc(e.data?JSON.stringify(e.data):'')}</span></span></div>`).join(''):'No logs yet';$('ranked').innerHTML=ranked.length?ranked.map(r=>`<tr><td>${esc(r.symbol)}</td><td>${num(r.score)}</td><td class="${sideClass(r.side)}">${esc(r.side||'—')}</td><td>${r.trade?'yes':'no'}</td><td class="muted">${esc(r.reason||'—')}</td><td>${money(r.risk_amount)}</td></tr>`).join(''):'<tr><td colspan="6" class="muted">No ranking yet</td></tr>';$('trades').innerHTML=trades.length?trades.map(t=>`<tr><td>${esc(t.symbol)}</td><td class="${sideClass(t.side)}">${esc(t.side)}</td><td>${num(t.entry_price,4)}</td><td class="${(+t.unrealized_pnl)>=0?'long':'short'}">${money(t.unrealized_pnl)}</td><td>${money(t.risk_amount)}</td><td>${t.bars_open??'—'}</td></tr>`).join(''):'<tr><td colspan="6" class="muted">No open trades</td></tr>';$('tradeLog').innerHTML=tradeLog.length?tradeLog.slice(-50).reverse().map(t=>`<tr><td>${esc(t.id)}</td><td class="${sideClass(t.side)}">${esc(t.side)}</td><td>${esc(t.exit_type)}</td><td class="${(+t.pnl)>=0?'long':'short'}">${money(t.pnl)}</td><td>${money(t.capital)}</td></tr>`).join(''):'<tr><td colspan="5" class="muted">No closed trades</td></tr>'}async function poll(){try{const r=await fetch('/state',{cache:'no-store'});if(r.ok){render(await r.json());$('conn').textContent='connected /state'}}catch(e){}}function ws(){const proto=location.protocol==='https:'?'wss':'ws';const urls=[`${proto}://${location.host}/ws`,`${proto}://${location.host}/ws/state`,`${proto}://${location.host}/api/ws`];let i=0;function next(){if(i>=urls.length){setInterval(poll,3000);poll();return}const w=new WebSocket(urls[i++]);w.onopen=()=>$('conn').textContent='connected websocket';w.onmessage=e=>{try{render(JSON.parse(e.data))}catch(_){}};w.onerror=()=>w.close();w.onclose=()=>{if(!last)next()}}next()}ws();</script></body></html>
