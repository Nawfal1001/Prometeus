<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMETHEUS — Settings</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">⚡ PROMETHEUS</div>
  <div class="nav-links">
    <a href="/">Dashboard</a><a href="/backtest">Backtest</a>
    <a href="/optimize">Optimize</a><a href="/settings" class="active">Settings</a>
  </div>
  <div class="nav-status"><span id="status-badge" class="badge badge-stopped">STOPPED</span></div>
</nav>

<div class="container">
  <div class="settings-header">
    <h1>⚙️ Settings</h1>
    <div>
      <button class="btn btn-secondary" onclick="resetSettings()">↺ Reset</button>
      <button class="btn btn-primary" onclick="saveSettings()">💾 Save All</button>
    </div>
  </div>
  <div id="save-msg" class="save-msg" style="display:none"></div>

  <form id="settings-form">

  <div class="settings-section">
    <div class="section-title">📊 Trading Parameters</div>
    <div class="settings-grid">
      <div class="field-group"><label>Fusion Threshold</label><input type="number" name="FUSION_THRESHOLD" min="0.05" max="0.95" step="0.01"><span class="hint">Smaller = more trades. Recommended: 0.12–0.25</span></div>
      <div class="field-group"><label>Chaos Volatility Threshold</label><input type="number" name="REGIME_CHAOS_VOLATILITY" min="0.01" max="0.20" step="0.005"><span class="hint">Higher = less likely to enter CHAOS regime</span></div>
    </div>
  </div>

<script>
console.log('Settings precision patch loaded');
</script>
</body>
</html>
