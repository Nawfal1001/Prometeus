services:
  - type: web
    name: prometheus-trading
    env: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: TRADING_MODE
        value: paper
      - key: LOG_LEVEL
        value: INFO
